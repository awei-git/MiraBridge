# Triggered when a PR is labeled with review/* — dispatches review to agent
name: Agent Review

on:
  pull_request:
    types: [labeled, opened, synchronize]

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: >-
      contains(join(github.event.pull_request.labels.*.name, ','), 'review/') &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'status/review')
    steps:
      - name: Determine review agent
        id: reviewer
        run: |
          LABELS='${{ join(github.event.pull_request.labels.*.name, ',') }}'
          if echo "$LABELS" | grep -q "review/claude"; then
            echo "agent=claude" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "review/codex"; then
            echo "agent=codex" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "review/gemini"; then
            echo "agent=gemini" >> "$GITHUB_OUTPUT"
          else
            echo "agent=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review assignment comment
        if: steps.reviewer.outputs.agent != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const agent = '${{ steps.reviewer.outputs.agent }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🔍 **[coordinator]** Review assigned to \`${agent}\`. Dispatching...`
            });

      - name: Trigger repository dispatch for review
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'agent-review',
              client_payload: {
                pr_number: context.payload.pull_request.number,
                agent: '${{ steps.reviewer.outputs.agent }}',
                title: context.payload.pull_request.title,
                branch: context.payload.pull_request.head.ref,
                base: context.payload.pull_request.base.ref
              }
            });
