# Auto-merge PRs that are approved and pass CI
name: Auto Merge

on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved'
    steps:
      - name: Check for status/approved label
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            const labels = pr.data.labels.map(l => l.name);
            const hasApproved = labels.includes('status/approved');
            core.setOutput('should_merge', hasApproved.toString());

      - name: Wait for CI and merge
        if: steps.check.outputs.should_merge == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            // Enable auto-merge
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });

              // Update labels
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'status/approved'
              }).catch(() => {});

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['status/merged']
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '✅ **[coordinator]** PR merged automatically after approval + CI pass.'
              });
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `⚠️ **[coordinator]** Auto-merge failed: ${e.message}\n\nCI may still be running. Will retry on check_suite completion.`
              });
            }

  # Also handle check_suite completion — retry merge for approved PRs
  merge-on-ci:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'check_suite' &&
      github.event.check_suite.conclusion == 'success'
    steps:
      - name: Find approved PRs for this commit
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.check_suite.head_sha;
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'updated',
              direction: 'desc',
              per_page: 10
            });

            for (const pr of prs.data) {
              if (pr.head.sha !== sha) continue;
              const labels = pr.labels.map(l => l.name);
              if (!labels.includes('status/approved')) continue;

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash'
                });

                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: 'status/approved'
                }).catch(() => {});

                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: ['status/merged']
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: '✅ **[coordinator]** PR merged after CI passed.'
                });
              } catch (e) {
                core.warning(`Failed to merge PR #${pr.number}: ${e.message}`);
              }
            }
