# Triggered when an issue is labeled with agent/* — notifies the coordinator
name: Agent Dispatch

on:
  issues:
    types: [labeled, opened]

permissions:
  issues: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: >-
      contains(join(github.event.issue.labels.*.name, ','), 'agent/') &&
      contains(join(github.event.issue.labels.*.name, ','), 'status/todo')
    steps:
      - name: Determine assigned agent
        id: agent
        run: |
          LABELS='${{ join(github.event.issue.labels.*.name, ',') }}'
          if echo "$LABELS" | grep -q "agent/claude"; then
            echo "agent=claude" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "agent/codex"; then
            echo "agent=codex" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "agent/gemini"; then
            echo "agent=gemini" >> "$GITHUB_OUTPUT"
          else
            echo "agent=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Post assignment comment
        if: steps.agent.outputs.agent != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const agent = '${{ steps.agent.outputs.agent }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **[coordinator]** Task assigned to \`${agent}\`. Waiting for agent pickup.\n\nThe local coordinator daemon will dispatch this to the ${agent} agent.`
            });

      - name: Trigger repository dispatch for local coordinator
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'agent-task',
              client_payload: {
                issue_number: context.issue.number,
                agent: '${{ steps.agent.outputs.agent }}',
                title: context.payload.issue.title,
                body: context.payload.issue.body || ''
              }
            });
